<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Umfrage-Verteiler</title>
  <style>
    /* Basic page setup */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f3f3f3;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 0.5em;
    }

    p {
      color: #555;
      margin-bottom: 2em;
    }

    /* Spinner container */
    .loader {
      border: 8px solid #f3f3f3; /* Light gray background */
      border-top: 8px solid #3498db; /* Blue spinning part */
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }

    /* Animation keyframes */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Optional overlay (not necessary for your layout but good for reuse) */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .hidden {
      display: none;
    }
  </style>

  <script>
    const links = [
      ["https://survey.questionstar.com/23d3dd3d3", "counterf"]
    ];

    const API_BASE = "https://api.counterapi.dev/v1/bewertungsstudie";
    const CORS_PROXY = "https://cors-anywhere-gryk.onrender.com/";

    // Fetch up_count for all counters
    async function fetchCounts() {
      return Promise.all(
        links.map(async ([_, counterName]) => {
          try {
            const res = await fetch(`${CORS_PROXY}${API_BASE}/${counterName}`, {
              method: 'GET',
              headers: { 'Origin': 'github' }
            });
            const json = await res.json();
            return [json.count, json.name];
          } catch (err) {
            console.error(`Error fetching counter ${counterName}:`, err);
            return [0, counterName];
          }
        })
      );
    }

    // Pick a random index among links with the lowest count
    function getNextIndex(countPairs) {
      const counts = countPairs.map(([count]) => count);
      const min = Math.min(...counts);
      const minIndices = counts
        .map((c, i) => (c === min ? i : -1))
        .filter(i => i !== -1);
      const chosenIndex = minIndices[Math.floor(Math.random() * minIndices.length)];
      return chosenIndex;
    }

    // Increment counter
    async function incrementCounter(counterName) {
      try {
        await fetch(`${CORS_PROXY}${API_BASE}/${counterName}/up`, {
          method: 'GET',
          headers: { 'Origin': 'github' }
        });
      } catch (err) {
        console.error(`Error incrementing counter ${counterName}:`, err);
      }
    }

    // Main redirect function
    async function redirectToSurvey() {
      try {
        const counts = await fetchCounts();
        const idx = getNextIndex(counts);
        const [link, counterName] = links[idx];

        await Promise.all([
          incrementCounter(counterName),
          incrementCounter("countertotal")
        ]);

        // Redirect to the survey
        window.location.href = link;
      } catch (err) {
        console.error("Error during redirect:", err);
        alert("Etwas ist schiefgelaufen. Bitte versuchen Sie es erneut.");
      }
    }

    // Wait for page to render spinner before running heavy tasks
    window.onload = function() {
      // Give the browser time to paint the spinner
      setTimeout(redirectToSurvey, 200);
    };
  </script>
</head>

<body>
  <h1>Sie werden gleich weitergeleitet ...</h1>
  <p>Das kann bis zu einer Minute dauern, bitte verlassen Sie die Seite nicht.</p>
  <div class="loader"></div>
</body>
</html>

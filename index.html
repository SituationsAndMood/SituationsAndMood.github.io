<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Umfrage-Verteiler</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f3f3f3;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 0.5em;
    }

    p {
      color: #555;
      margin-bottom: 1em;
    }

    /* Spinner container */
    .loader {
      border: 8px solid #f3f3f3; /* Light gray background */
      border-top: 8px solid #3498db; /* Blue spinning part */
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite, pulse 2s ease-in-out infinite;
    }

    /* Spinner animation */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Subtle glowing pulse */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 5px #3498db33; }
      50% { box-shadow: 0 0 20px #3498db99; }
    }

    /* Status message */
    #status {
      margin-top: 1em;
      color: #777;
      font-size: 0.95em;
      transition: opacity 0.5s;
    }

  </style>

  <script>
    const links = [
      ["https://survey.questionstar.com/e67f8432", "countera"],
      ["https://survey.questionstar.com/e2bf3e1d", "counterb"],
      ["https://survey.questionstar.com/8742d15e", "counterc"],
      ["https://survey.questionstar.com/55b6420c", "counterd"],
      ["https://survey.questionstar.com/76ddaced", "countere"],
      ["https://survey.questionstar.com/abe6fb40", "counterf"],
      ["https://survey.questionstar.com/22cd6d86", "counterg"],
      ["https://survey.questionstar.com/ec5bb37b", "counterh"],
      ["https://survey.questionstar.com/969cd77b", "counteri"]
    ];

    const API_BASE = "https://api.counterapi.dev/v2/bewertungsstudie";
    const CORS_PROXY = "https://cors-anywhere-gryk.onrender.com/";

    async function fetchCounts() {
      return Promise.all(
        links.map(async ([_, counterName]) => {
          try {
            const res = await fetch(`${CORS_PROXY}${API_BASE}/${counterName}`, {
              method: 'GET',
              headers: { 'Origin': 'github' }
            });
            const json = await res.json();
            return [json.count, json.name];
          } catch (err) {
            console.error(`Error fetching counter ${counterName}:`, err);
            return [0, counterName];
          }
        })
      );
    }

    function getNextIndex(countPairs) {
      const counts = countPairs.map(([count]) => count);
      const min = Math.min(...counts);
      const minIndices = counts
        .map((c, i) => (c === min ? i : -1))
        .filter(i => i !== -1);
      return minIndices[Math.floor(Math.random() * minIndices.length)];
    }

    async function incrementCounter(counterName) {
      try {
        await fetch(`${CORS_PROXY}${API_BASE}/${counterName}/up`, {
          method: 'GET',
          headers: { 'Origin': 'github' }
        });
      } catch (err) {
        console.error(`Error incrementing counter ${counterName}:`, err);
      }
    }

    async function redirectToSurvey() {
      try {
        const counts = await fetchCounts();
        const idx = getNextIndex(counts);
        const [link, counterName] = links[idx];

        await Promise.all([
          incrementCounter(counterName),
          incrementCounter("countertotal")
        ]);

        window.location.href = link;
      } catch (err) {
        console.error("Error during redirect:", err);
        alert("Etwas ist schiefgelaufen. Bitte versuchen Sie es erneut.");
      }
    }

    // Timer feedback for user
    function startStatusTimer(durationSeconds = 60) {
      const statusEl = document.getElementById("status");
      let elapsed = 0;
      const interval = setInterval(() => {
        elapsed++;
        statusEl.textContent = `Bitte warten... ${elapsed} Sekunde${elapsed !== 1 ? 'n' : ''} vergangen`;
        if (elapsed >= durationSeconds) clearInterval(interval);
      }, 1000);
    }

    window.onload = function() {
      startStatusTimer(120);
      setTimeout(redirectToSurvey, 200);
    };
  </script>
</head>

<body>
  <h1>Sie werden gleich weitergeleitet ...</h1>
  <p>Das kann bis zu einer Minute dauern, bitte verlassen Sie die Seite nicht.</p>
  <div class="loader"></div>
  <div id="status">Bitte warten...</div>
</body>
</html>
